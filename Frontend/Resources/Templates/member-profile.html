<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Member Profile – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #e94560 !important; font-weight: 700; }
    .nav-link { color: #bbb !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .profile-banner { background: linear-gradient(135deg, #1a1a2e, #0f3460);
                      color: white; padding: 2.5rem; border-radius: 12px 12px 0 0; text-align: center; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #e94560;
              color: white; font-size: 2rem; font-weight: 700;
              display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .info-row { padding: .85rem 0; border-bottom: 1px solid #f0f0f0; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-weight: 600; color: #555; min-width: 140px; display: inline-block; }
    .benefits-box { background: #f8f9fa; border-left: 4px solid #e94560;
                    padding: .9rem 1rem; border-radius: 4px; margin-top: 1rem; }
    .badge-premium { background-color: #e94560; }
    .badge-regular { background-color: #0f3460; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/members"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/members">Members</a></li>
    </ul>
  </div>
</nav>
<div class="container pb-5"><div class="row justify-content-center"><div class="col-lg-6">
  <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
  <div class="card" th:if="${member}">
    <div class="profile-banner">
      <div class="avatar" th:text="${#strings.substring(member.name,0,1).toUpperCase()}"></div>
      <h4 class="mb-1" th:text="${member.name}"></h4>
      <span th:if="${member.membershipPlan == 'premium'}" class="badge badge-premium"
            th:text="${member.memberTypeLabel}"></span>
      <span th:unless="${member.membershipPlan == 'premium'}" class="badge badge-regular"
            th:text="${member.memberTypeLabel}"></span>
    </div>
    <div class="card-body p-4">
      <div class="info-row">
        <span class="info-label">Member ID</span>
        <code th:text="${member.memberId}"></code>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span th:text="${member.email}"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Phone</span>
        <span th:text="${member.phone}"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Address</span>
        <span th:text="${member.address}"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Join Date</span>
        <span th:text="${member.joinDate}"></span>
      </div>
      <!-- Polymorphism: getMembershipDetails() returns different text per subclass -->
      <div class="benefits-box">
        <p class="small text-muted text-uppercase fw-bold mb-1">Membership Benefits</p>
        <span th:text="${member.membershipDetails}"></span>
      </div>
      <div class="d-flex gap-2 mt-4">
        <a th:href="@{/members/{id}/edit(id=${member.memberId})}" class="btn btn-primary">Edit</a>
        <a href="/members" class="btn btn-outline-secondary">Back</a>
        <form th:action="@{/members/{id}/delete(id=${member.memberId})}"
              method="post" class="ms-auto" onsubmit="return confirm('Delete this member?');">
          <button class="btn btn-outline-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
