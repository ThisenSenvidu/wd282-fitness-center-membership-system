<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Member – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #e94560 !important; font-weight: 700; }
    .nav-link { color: #bbb !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { background: linear-gradient(135deg, #1a1a2e, #0f3460);
                   color: white; border-radius: 12px 12px 0 0 !important; }
    .form-control:focus, .form-select:focus {
      border-color: #e94560; box-shadow: 0 0 0 .2rem rgba(233,69,96,.2);
    }
    .plan-info-box { background: #fff8e1; border-left: 4px solid #ffc107;
                     padding: .7rem 1rem; border-radius: 4px; font-size: .9rem; display: none; }
    .hint-box { background: #f0f4ff; border-left: 4px solid #0f3460;
                padding: .8rem 1rem; border-radius: 4px; font-size: .9rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/members"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/members">Members</a></li>
    </ul>
  </div>
</nav>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div th:if="${errorMsg}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
      </div>

      <div class="card">
        <div class="card-header p-3">
          <h5 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Register New Member</h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/members/add}" method="post">

            <!-- Full Name -->
            <div class="mb-3">
              <label class="form-label fw-bold">Full Name *</label>
              <input type="text" class="form-control" name="name"
                     placeholder="e.g. Kavya Perera" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label fw-bold">Email *</label>
              <input type="email" class="form-control" name="email"
                     placeholder="member@email.com" required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
              <label class="form-label fw-bold">Phone *</label>
              <input type="text" class="form-control" name="phone"
                     placeholder="e.g. 077-1234567" required>
            </div>

            <!-- Address -->
            <div class="mb-3">
              <label class="form-label fw-bold">Address *</label>
              <input type="text" class="form-control" name="address"
                     placeholder="e.g. 12 Main St, Colombo" required>
            </div>

            <!-- Join Date -->
            <div class="mb-3">
              <label class="form-label fw-bold">Join Date *</label>
              <input type="date" class="form-control" name="joinDate" required>
            </div>

            <!--
              Membership Plan Dropdown — connected to plans.txt via PlanService.
              Shows all available plans with their prices so the admin can pick one.
              If no plans exist yet, falls back to radio buttons.
            -->
            <div class="mb-3" th:if="${not #lists.isEmpty(plans)}">
              <label class="form-label fw-bold">
                Membership Plan *
                <span class="badge bg-success ms-1" style="font-size:.7rem;">
                  <i class="bi bi-link-45deg"></i> linked to plans
                </span>
              </label>
              <select class="form-select" name="membershipPlan" id="planSelect"
                      onchange="showPlanInfo(this)" required>
                <option value="" disabled selected>Choose a plan...</option>
                <option th:each="p : ${plans}"
                        th:value="${p.planType}"
                        th:text="${p.planName + '  —  ' + p.formattedPrice}"
                        th:attr="data-desc=${p.description},data-price=${p.formattedPrice}">
                </option>
              </select>
              <!-- Plan info box: shows description when a plan is selected -->
              <div class="plan-info-box mt-2" id="planInfoBox">
                <i class="bi bi-info-circle me-1 text-warning"></i>
                <strong id="planInfoPrice"></strong> &nbsp;—&nbsp;
                <span id="planInfoDesc"></span>
              </div>
            </div>

            <!-- Fallback: radio buttons if no plans in system yet -->
            <div class="mb-3" th:unless="${not #lists.isEmpty(plans)}">
              <div class="hint-box mb-2">
                <i class="bi bi-info-circle me-1"></i>
                No plans found. Add membership plans first or select manually below.
              </div>
              <label class="form-label fw-bold">Membership Plan *</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="membershipPlan"
                         id="planRegular" value="regular" required>
                  <label class="form-check-label" for="planRegular">
                    <i class="bi bi-person-fill text-primary me-1"></i>Regular
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="membershipPlan"
                         id="planPremium" value="premium">
                  <label class="form-check-label" for="planPremium">
                    <i class="bi bi-star-fill text-danger me-1"></i>Premium
                  </label>
                </div>
              </div>
            </div>

            <!--
              Trainer Dropdown (optional) — connected to trainers.txt via TrainerService.
              Allows assigning a trainer to the member at registration time.
              This field is optional — member can be registered without a trainer.
            -->
            <div class="mb-4" th:if="${not #lists.isEmpty(trainers)}">
              <label class="form-label fw-bold">
                Assign Trainer
                <span class="text-muted fw-normal">(optional)</span>
                <span class="badge bg-success ms-1" style="font-size:.7rem;">
                  <i class="bi bi-link-45deg"></i> linked to trainers
                </span>
              </label>
              <select class="form-select" name="assignedTrainerId">
                <option value="">No trainer assigned</option>
                <option th:each="t : ${trainers}"
                        th:value="${t.trainerId}"
                        th:text="${t.name + '  —  ' + t.specialization + '  (' + t.typeLabel + ')'}">
                </option>
              </select>
              <div class="form-text">You can assign a trainer later from the member profile.</div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-danger px-4">
                <i class="bi bi-check-lg me-1"></i>Register Member
              </button>
              <a href="/members" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>Cancel
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Show plan description and price when a plan is selected
  function showPlanInfo(select) {
    const opt     = select.options[select.selectedIndex];
    const infoBox = document.getElementById('planInfoBox');
    const priceEl = document.getElementById('planInfoPrice');
    const descEl  = document.getElementById('planInfoDesc');

    if (opt.value) {
      priceEl.textContent = opt.dataset.price  || '';
      descEl.textContent  = opt.dataset.desc   || '';
      infoBox.style.display = 'block';
    } else {
      infoBox.style.display = 'none';
    }
  }
</script>
</body>
</html>
