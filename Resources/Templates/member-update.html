<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Member – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #e94560 !important; font-weight: 700; }
    .nav-link { color: #bbb !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { background: linear-gradient(135deg, #0f3460, #1a1a2e);
                   color: white; border-radius: 12px 12px 0 0 !important; }
    .form-control:focus, .form-select:focus {
      border-color: #0f3460; box-shadow: 0 0 0 .2rem rgba(15,52,96,.2);
    }
    .plan-info-box { background: #fff8e1; border-left: 4px solid #ffc107;
                     padding: .7rem 1rem; border-radius: 4px; font-size: .9rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/members"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/members">Members</a></li>
    </ul>
  </div>
</nav>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

      <div class="card">
        <div class="card-header p-3 d-flex justify-content-between align-items-center">
          <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Update Member</h5>
          <span class="badge bg-light text-dark font-monospace"
                th:text="${member.memberId}"></span>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/members/{id}/edit(id=${member.memberId})}" method="post">

            <div class="mb-3">
              <label class="form-label fw-bold">Full Name *</label>
              <input type="text" class="form-control" name="name"
                     th:value="${member.name}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Email *</label>
              <input type="email" class="form-control" name="email"
                     th:value="${member.email}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Phone *</label>
              <input type="text" class="form-control" name="phone"
                     th:value="${member.phone}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Address *</label>
              <input type="text" class="form-control" name="address"
                     th:value="${member.address}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Join Date *</label>
              <input type="date" class="form-control" name="joinDate"
                     th:value="${member.joinDate}" required>
            </div>

            <!--
              Plan Dropdown — pre-selects the member's current plan.
              Connected to plans.txt via PlanService.
            -->
            <div class="mb-3" th:if="${not #lists.isEmpty(plans)}">
              <label class="form-label fw-bold">
                Membership Plan *
                <span class="badge bg-success ms-1" style="font-size:.7rem;">
                  <i class="bi bi-link-45deg"></i> linked to plans
                </span>
              </label>
              <select class="form-select" name="membershipPlan" required>
                <option th:each="p : ${plans}"
                        th:value="${p.planType}"
                        th:text="${p.planName + '  —  ' + p.formattedPrice}"
                        th:selected="${p.planType == member.membershipPlan}">
                </option>
              </select>
              <div class="plan-info-box mt-2">
                <i class="bi bi-star me-1 text-warning"></i>
                Current plan: <strong th:text="${member.membershipPlan}"></strong>
              </div>
            </div>

            <!-- Fallback if no plans exist -->
            <div class="mb-3" th:unless="${not #lists.isEmpty(plans)}">
              <label class="form-label fw-bold">Membership Plan *</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="membershipPlan"
                         value="regular"
                         th:checked="${member.membershipPlan == 'regular'}" required>
                  <label class="form-check-label">Regular</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="membershipPlan"
                         value="premium"
                         th:checked="${member.membershipPlan == 'premium'}">
                  <label class="form-check-label">Premium</label>
                </div>
              </div>
            </div>

            <!--
              Trainer Dropdown — connected to trainers.txt via TrainerService.
              Pre-selects assigned trainer if one exists.
            -->
            <div class="mb-4" th:if="${not #lists.isEmpty(trainers)}">
              <label class="form-label fw-bold">
                Assigned Trainer
                <span class="text-muted fw-normal">(optional)</span>
                <span class="badge bg-success ms-1" style="font-size:.7rem;">
                  <i class="bi bi-link-45deg"></i> linked to trainers
                </span>
              </label>
              <select class="form-select" name="assignedTrainerId">
                <option value="">No trainer assigned</option>
                <option th:each="t : ${trainers}"
                        th:value="${t.trainerId}"
                        th:text="${t.name + '  —  ' + t.specialization}">
                </option>
              </select>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-save me-1"></i>Save Changes
              </button>
              <a href="/members" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>Cancel
              </a>
              <form th:action="@{/members/{id}/delete(id=${member.memberId})}"
                    method="post" class="ms-auto"
                    onsubmit="return confirm('Delete this member?');">
                <button type="submit" class="btn btn-outline-danger">
                  <i class="bi bi-trash me-1"></i>Delete
                </button>
              </form>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
