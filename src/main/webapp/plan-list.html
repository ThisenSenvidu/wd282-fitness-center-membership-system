<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Plans</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{--teal:#00C9B1;--blue:#1A6FB5;--dark:#060d14;--white:#fff;--muted:rgba(255,255,255,0.5);--off-white:rgba(255,255,255,0.85);--gold:#F5C842;}
        html,body{min-height:100vh;background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;}

        .topnav{position:fixed;top:0;left:0;right:0;height:56px;z-index:200;background:rgba(4,10,18,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,201,177,0.12);display:flex;align-items:center;padding:0 20px;}
        .topnav .logo-link{text-decoration:none;display:flex;align-items:center;margin-right:24px;flex-shrink:0;}
        .topnav .logo-img{height:32px;width:auto;filter:drop-shadow(0 0 8px rgba(0,201,177,0.35));}
        .topnav nav{display:flex;align-items:center;gap:1px;flex:1;}
        .topnav nav a{display:flex;align-items:center;gap:5px;padding:7px 10px;font-size:12px;font-weight:400;color:rgba(255,255,255,0.5);text-decoration:none;transition:all 0.2s ease;border-radius:4px;white-space:nowrap;}
        .topnav nav a svg{width:13px;height:13px;opacity:0.55;flex-shrink:0;}
        .topnav nav a:hover{color:#fff;background:rgba(0,201,177,0.07);}
        .topnav nav a.active{color:#00C9B1;background:rgba(0,201,177,0.1);}
        .topnav nav a.active svg{opacity:1;fill:#00C9B1;}
        .topnav .nav-actions{margin-left:12px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
        .btn-nav-outline{background:transparent;border:1.5px solid rgba(255,255,255,0.35);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:6px 14px;border-radius:4px;text-decoration:none;display:inline-block;}
        .btn-nav-join{background:#00C9B1;border:1.5px solid #00C9B1;color:#04080f;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:6px 14px;border-radius:4px;text-decoration:none;display:inline-block;}

        .main{margin-top:56px;padding:36px 48px;}
        .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;}
        .page-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:0.03em;line-height:1;}
        .page-title span{color:var(--teal);}
        .page-sub{font-size:13px;color:var(--muted);margin-top:6px;}

        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
        .stat-card{background:rgba(8,18,30,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 20px;}
        .stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);line-height:1;}
        .stat-num.teal{color:var(--teal);} .stat-num.gold{color:var(--gold);}
        .stat-label{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;}

        .filter-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
        .filter-btn{font-size:12px;font-weight:500;padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
        .filter-btn:hover{border-color:var(--teal);color:var(--teal);}
        .filter-btn.active{background:var(--teal);border-color:var(--teal);color:#04080f;font-weight:600;}

        .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
        .plan-card{background:rgba(8,18,30,0.9);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:22px;transition:all 0.25s;position:relative;overflow:hidden;animation:fadeUp 0.4s ease both;}
        .plan-card:hover{border-color:rgba(0,201,177,0.35);transform:translateY(-3px);}
        .plan-card.premium{border-color:rgba(245,200,66,0.2);}
        .plan-card.premium:hover{border-color:rgba(245,200,66,0.5);}
        .plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--teal),var(--blue));opacity:0;transition:opacity 0.25s;}
        .plan-card:hover::before{opacity:1;}
        .plan-card.premium::before{background:linear-gradient(to right,var(--gold),#e8a800);}

        .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
        .badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;}
        .badge-individual{background:rgba(0,201,177,0.1);color:var(--teal);border:1px solid rgba(0,201,177,0.25);}
        .badge-couple{background:rgba(26,111,181,0.12);color:#5aabff;border:1px solid rgba(26,111,181,0.3);}
        .badge-premium{background:rgba(245,200,66,0.1);color:var(--gold);border:1px solid rgba(245,200,66,0.3);}

        .plan-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.04em;color:var(--white);margin-bottom:3px;}
        .plan-duration{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
        .plan-price{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.02em;color:var(--white);line-height:1;margin-bottom:4px;}
        .plan-price span{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;color:var(--muted);}
        .plan-desc{font-size:12px;color:var(--muted);line-height:1.6;margin:10px 0 14px;}
        .features{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
        .feature{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--off-white);}
        .feature-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;}
        .feature-dot.gold{background:var(--gold);}

        /* JOIN NOW button — visitor action only */
        .btn-join-plan{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:10px 0;border-radius:6px;border:none;background:var(--teal);color:#04080f;cursor:pointer;transition:all 0.2s;margin-top:4px;}
        .btn-join-plan:hover{background:#00b59e;transform:translateY(-1px);}
        .plan-card.premium .btn-join-plan{background:var(--gold);color:#1a0f00;}
        .plan-card.premium .btn-join-plan:hover{background:#e8c030;}

        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
    </style>
</head>

<div class="main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Membership <span>Plans</span></h1>
            <p class="page-sub">Choose the perfect plan for your fitness journey — Individual & Couple options available</p>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-num teal">12</div><div class="stat-label">Total Plans</div></div>
        <div class="stat-card"><div class="stat-num">6</div><div class="stat-label">Individual</div></div>
        <div class="stat-card"><div class="stat-num">6</div><div class="stat-label">Couple</div></div>
        <div class="stat-card"><div class="stat-num gold">6</div><div class="stat-label">Premium</div></div>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" onclick="filterPlans('all',this)">All Plans</button>
        <button class="filter-btn" onclick="filterPlans('individual',this)">Individual</button>
        <button class="filter-btn" onclick="filterPlans('couple',this)">Couple</button>
        <button class="filter-btn" onclick="filterPlans('1-month',this)">1 Month</button>
        <button class="filter-btn" onclick="filterPlans('3-month',this)">3 Months</button>
        <button class="filter-btn" onclick="filterPlans('1-year',this)">1 Year</button>
        <button class="filter-btn" onclick="filterPlans('premium',this)">Premium Only</button>
    </div>

    <div class="plans-grid" id="plansGrid"></div>
</div>

<script>
    const plans=[
      {id:'PLN001',name:'Individual Basic',memberType:'individual',duration:'1 Month',durationKey:'1-month',price:2500,isPremium:false,desc:'Perfect starter plan for solo gym-goers.',features:['Full gym access','Locker room access','Basic equipment']},
      {id:'PLN002',name:'Individual Standard',memberType:'individual',duration:'3 Months',durationKey:'3-month',price:6500,isPremium:false,desc:'Great value for committed individuals.',features:['Full gym access','Locker room access','Basic equipment','Group classes']},
      {id:'PLN003',name:'Individual Pro',memberType:'individual',duration:'1 Year',durationKey:'1-year',price:22000,isPremium:false,desc:'Best value annual plan for individuals.',features:['Full gym access','All equipment','Group classes','Fitness assessment']},
      {id:'PLN004',name:'Individual Premium',memberType:'individual',duration:'1 Month',durationKey:'1-month',price:4500,isPremium:true,desc:'Premium monthly plan with personal trainer.',features:['Full gym access','Personal Trainer sessions','Pool access','Nutrition advice','Priority booking']},
      {id:'PLN005',name:'Individual Premium+',memberType:'individual',duration:'3 Months',durationKey:'3-month',price:11500,isPremium:true,desc:'3-month premium with all exclusive perks.',features:['Full gym access','Personal Trainer sessions','Pool access','Nutrition advice','Spa access']},
      {id:'PLN006',name:'Individual Elite',memberType:'individual',duration:'1 Year',durationKey:'1-year',price:38000,isPremium:true,desc:'The ultimate annual premium package.',features:['Full gym access','Unlimited Personal Trainer','Pool access','Nutrition advice','Spa access','Guest passes']},
      {id:'PLN007',name:'Couple Basic',memberType:'couple',duration:'1 Month',durationKey:'1-month',price:4500,isPremium:false,desc:'Affordable gym access for two.',features:['2 member access','Full gym access','Locker room access','Basic equipment']},
      {id:'PLN008',name:'Couple Standard',memberType:'couple',duration:'3 Months',durationKey:'3-month',price:11500,isPremium:false,desc:'Great 3-month plan for couples.',features:['2 member access','Full gym access','All equipment','Group classes']},
      {id:'PLN009',name:'Couple Pro',memberType:'couple',duration:'1 Year',durationKey:'1-year',price:38000,isPremium:false,desc:'Best value annual couple plan.',features:['2 member access','Full gym access','All equipment','Couples fitness assessment']},
      {id:'PLN010',name:'Couple Premium',memberType:'couple',duration:'1 Month',durationKey:'1-month',price:7500,isPremium:true,desc:'Premium couple plan with personal trainer.',features:['2 member access','Personal Trainer sessions','Pool access','Nutrition advice','Priority booking']},
      {id:'PLN011',name:'Couple Premium+',memberType:'couple',duration:'3 Months',durationKey:'3-month',price:19500,isPremium:true,desc:'Premium 3-month package for two.',features:['2 member access','Personal Trainer sessions','Pool access','Nutrition advice','Spa access']},
      {id:'PLN012',name:'Couple Elite',memberType:'couple',duration:'1 Year',durationKey:'1-year',price:65000,isPremium:true,desc:'The ultimate premium package for couples.',features:['2 member access','Unlimited Personal Trainer','Pool access','Nutrition advice','Spa access','Guest passes']},
    ];

    function renderPlans(filtered){
      const grid=document.getElementById('plansGrid');
      grid.innerHTML='';
      if(!filtered.length){grid.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">No plans found.</div>';return;}
      filtered.forEach((p,i)=>{
        const isPremium=p.isPremium;
        const featureHTML=p.features.map(f=>`<div class="feature"><div class="feature-dot ${isPremium?'gold':''}""></div>${f}</div>`).join('');
        const card=document.createElement('div');
        card.className=`plan-card ${isPremium?'premium':''}`;
        card.style.animationDelay=(i*0.05)+'s';
        card.innerHTML=`
          <div class="card-top">
            <span class="badge badge-${p.memberType}">${p.memberType==='individual'?'Individual':'Couple'}</span>
            ${isPremium?'<span class="badge badge-premium">Premium</span>':''}
          </div>
          <div class="plan-name">${p.name}</div>
          <div class="plan-duration">${p.duration}</div>
          <div class="plan-price">Rs. ${p.price.toLocaleString()} <span>/ ${p.duration}</span></div>
          <div class="plan-desc">${p.desc}</div>
          <div class="features">${featureHTML}</div>
          <button class="btn-join-plan" onclick="joinPlan('${p.name}')">Join Now — Rs. ${p.price.toLocaleString()}</button>
        `;
        grid.appendChild(card);
      });
    }

    function filterPlans(type,btn){
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      let f=plans;
      if(type==='individual') f=plans.filter(p=>p.memberType==='individual');
      else if(type==='couple') f=plans.filter(p=>p.memberType==='couple');
      else if(type==='premium') f=plans.filter(p=>p.isPremium);
      else if(type!=='all') f=plans.filter(p=>p.durationKey===type);
      renderPlans(f);
    }

    function joinPlan(name){
      alert('Joining "'+name+'" — Please visit the front desk or log in to complete your registration!');
    }

    renderPlans(plans);
</script>

<script>
    // Auth check — redirect to login if trying to access admin pages directly
    function checkAuth() {
      const isAdmin = sessionStorage.getItem('fitzone_admin') === 'true';
      // Show/hide admin links in nav
      const adminLinks = document.getElementById('adminLinks');
      const adminDivider = document.getElementById('adminDivider');
      const visitorActions = document.getElementById('visitorActions');
      const adminActions = document.getElementById('adminActions');
      if (adminLinks) {
        if (isAdmin) {
          adminLinks.style.display = 'flex';
          if(adminDivider) adminDivider.style.display = 'block';
          if(visitorActions) visitorActions.style.display = 'none';
          if(adminActions) { adminActions.style.display = 'flex'; }
          const adminName = document.getElementById('adminName');
          if(adminName) adminName.textContent = sessionStorage.getItem('fitzone_user') || 'Admin';
        }
      }
    }
    function doLogout() {
      sessionStorage.removeItem('fitzone_admin');
      sessionStorage.removeItem('fitzone_user');
      window.location.href = '/index.html';
    }
    checkAuth();
</script>

</body>
</html>
