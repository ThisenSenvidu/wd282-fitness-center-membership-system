<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Workout Program – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #e94560 !important; font-weight: 700; }
    .nav-link { color: #bbb !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { background: linear-gradient(135deg, #0f3460, #1a1a2e);
                   color: white; border-radius: 12px 12px 0 0 !important; }
    .form-control:focus, .form-select:focus {
      border-color: #0f3460; box-shadow: 0 0 0 .2rem rgba(15,52,96,.2);
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/workouts"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/workouts">Programs</a></li>
    </ul>
  </div>
</nav>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

      <div class="card">
        <div class="card-header p-3 d-flex justify-content-between align-items-center">
          <h5 class="mb-0">
            <i class="bi bi-pencil-square me-2"></i>Edit Workout Program
          </h5>
          <span class="badge bg-light text-dark font-monospace"
                th:text="${program.programId}"></span>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/workouts/{id}/edit(id=${program.programId})}" method="post">

            <!-- Program Type -->
            <div class="mb-3">
              <label class="form-label fw-bold">Program Type *</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="programType"
                         value="strength"
                         th:checked="${program.programType == 'strength'}" required>
                  <label class="form-check-label">
                    <i class="bi bi-trophy-fill text-danger me-1"></i>Strength Training
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="programType"
                         value="cardio"
                         th:checked="${program.programType == 'cardio'}">
                  <label class="form-check-label">
                    <i class="bi bi-heart-pulse-fill text-primary me-1"></i>Cardio Training
                  </label>
                </div>
              </div>
            </div>

            <!-- Program Name -->
            <div class="mb-3">
              <label class="form-label fw-bold">Program Name *</label>
              <input type="text" class="form-control" name="programName"
                     th:value="${program.programName}" required>
            </div>

            <!-- Target Goal -->
            <div class="mb-3">
              <label class="form-label fw-bold">Target Goal *</label>
              <input type="text" class="form-control" name="targetGoal"
                     th:value="${program.targetGoal}" required>
            </div>

            <!-- Duration -->
            <div class="mb-3">
              <label class="form-label fw-bold">Duration (Weeks) *</label>
              <input type="number" class="form-control" name="durationWeeks"
                     th:value="${program.durationWeeks}" min="1" required>
            </div>

            <!-- Difficulty Level -->
            <div class="mb-3">
              <label class="form-label fw-bold">Difficulty Level *</label>
              <select class="form-select" name="difficultyLevel" required>
                <option value="beginner"
                        th:selected="${program.difficultyLevel == 'beginner'}">Beginner</option>
                <option value="intermediate"
                        th:selected="${program.difficultyLevel == 'intermediate'}">Intermediate</option>
                <option value="advanced"
                        th:selected="${program.difficultyLevel == 'advanced'}">Advanced</option>
              </select>
            </div>

            <!-- Exercises -->
            <div class="mb-4">
              <label class="form-label fw-bold">Exercises *</label>
              <textarea class="form-control" name="exercises" rows="3"
                        th:text="${program.exercises}" required></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-save me-1"></i>Save Changes
              </button>
              <a href="/workouts" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>Cancel
              </a>
              <form th:action="@{/workouts/{id}/delete(id=${program.programId})}"
                    method="post" class="ms-auto"
                    onsubmit="return confirm('Delete this program?');">
                <button type="submit" class="btn btn-outline-danger">
                  <i class="bi bi-trash me-1"></i>Delete
                </button>
              </form>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
