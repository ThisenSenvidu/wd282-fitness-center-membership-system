<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      border: none; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      width: 100%; max-width: 420px;
    }
    .login-header {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: white; padding: 2rem; border-radius: 16px 16px 0 0; text-align: center;
    }
    .login-icon {
      width: 70px; height: 70px; border-radius: 50%;
      background: #e94560; color: white; font-size: 2rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .form-control:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 .2rem rgba(233,69,96,.2);
    }
    .btn-login {
      background: #e94560; border: none;
      padding: .75rem; font-weight: 600;
    }
    .btn-login:hover { background: #c73652; }
    .default-creds {
      background: #f0f4ff; border-left: 4px solid #0f3460;
      padding: .8rem 1rem; border-radius: 4px;
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <div class="login-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h4 class="mb-0">⚡ FitCenter Admin</h4>
      <small class="opacity-75">Sign in to access the admin panel</small>
    </div>
    <div class="card-body p-4">

      <!-- Success message (after logout) -->
      <div th:if="${successMsg}" class="alert alert-success">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
      </div>

      <!-- Error message -->
      <div th:if="${errorMsg}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
      </div>

      <!-- Default credentials hint -->
      <div class="default-creds mb-4">
        <i class="bi bi-info-circle me-1 text-primary"></i>
        <strong>Default login:</strong><br>
        Username: <code>admin</code> &nbsp;|&nbsp; Password: <code>admin123</code>
      </div>

      <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
          <label class="form-label fw-bold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" name="username"
                   placeholder="Enter username" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" name="password"
                   placeholder="Enter password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-login text-white w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
