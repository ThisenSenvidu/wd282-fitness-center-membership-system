<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Plans – FitCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: 700; }
        .nav-link { color: #bbb !important; }
        .nav-link:hover { color: #e94560 !important; }
        .banner { background: linear-gradient(135deg, #1a1a2e, #0f3460);
                  color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .table thead th { background: #1a1a2e; color: white; }
        .badge-premium { background-color: #e94560; }
        .badge-basic   { background-color: #0f3460; }
        .price-tag { font-size: 1.1rem; font-weight: 700; color: #e94560; }
        .discount-tag { font-size: 0.8rem; color: #28a745; font-weight: 600; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/home"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>    <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plans"><i class="bi bi-card-list me-1"></i>Plans</a></li>
        <li class="nav-item"><a class="nav-link" href="/plans/add"><i class="bi bi-plus-circle me-1"></i>Add Plan</a></li>
    </ul>
    </div>
</nav>

<div class="container pb-5">
    <div class="banner d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-1"><i class="bi bi-card-checklist me-2"></i>Membership Plan Management</h3>
            <p class="mb-0 opacity-75">Create, view, update and delete gym membership plans.</p>
        </div>
        <a href="/plans/add" class="btn btn-danger"><i class="bi bi-plus-lg me-1"></i>Add Plan</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search Bar -->
    <div class="card mb-4"><div class="card-body">
        <form action="/plans/search" method="get">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" name="keyword"
                       placeholder="Search by plan name or description..." th:value="${keyword}">
                <button class="btn btn-dark">Search</button>
                <a class="btn btn-outline-secondary" href="/plans">Reset</a>
            </div>
        </form>
    </div></div>

    <!-- Plans Table -->
    <div class="card"><div class="card-body p-0">
        <div th:if="${#lists.isEmpty(plans)}" class="text-center py-5">
            <i class="bi bi-card-list display-3 text-muted"></i>
            <p class="mt-2 text-muted">No plans found.</p>
            <a href="/plans/add" class="btn btn-dark">Add First Plan</a>
        </div>

        <div th:unless="${#lists.isEmpty(plans)}">
            <table class="table table-hover align-middle mb-0">
                <thead><tr>
                    <th>ID</th>
                    <th>Plan Name</th>
                    <th>Type</th>
                    <th>Base Price</th>
                    <th>Discounted Price</th>
                    <th>Duration</th>
                    <th>Description</th>
                    <th class="text-center">Actions</th>
                </tr></thead>
                <tbody>
                <tr th:each="p : ${plans}">
                    <td><code th:text="${p.planId}"></code></td>
                    <td><strong th:text="${p.planName}"></strong></td>
                    <td>
              <span th:if="${p.planType == 'premium'}" class="badge badge-premium"
                    th:text="${p.planTypeLabel}"></span>
                        <span th:unless="${p.planType == 'premium'}" class="badge badge-basic"
                              th:text="${p.planTypeLabel}"></span>
                    </td>
                    <td>
                        <span th:text="${'Rs. ' + #numbers.formatDecimal(p.price, 1, 2)}"></span>
                    </td>
                    <!--
                      Polymorphism: calculatePrice() returns different value for BasicPlan vs PremiumPlan.
                      BasicPlan returns base price. PremiumPlan applies 10% discount.
                    -->
                    <td>
                        <span class="price-tag" th:text="${p.formattedPrice}"></span>
                        <br>
                        <span th:if="${p.planType == 'premium'}" class="discount-tag">10% discount applied</span>
                    </td>
                    <td th:text="${p.durationMonths + ' month(s)'}"></td>
                    <td><small class="text-muted" th:text="${p.description}"></small></td>
                    <td class="text-center">
                        <a th:href="@{/plans/{id}/edit(id=${p.planId})}"
                           class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/plans/{id}/delete(id=${p.planId})}"
                              method="post"
                              class="d-inline"
                              th:attr="onsubmit=|return confirm('Delete [[${p.planName}]]?')|">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="card-footer text-muted small">
                Total: <strong th:text="${#lists.size(plans)}"></strong> plan(s)
            </div>
        </div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
