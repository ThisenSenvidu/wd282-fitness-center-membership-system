<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer List – FitCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body        { background: #f5f5f5; }
        .navbar     { background: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: 700; font-size: 1.3rem; }
        .nav-link   { color: #bbb !important; transition: color .2s; }
        .nav-link:hover, .nav-link.active { color: #e94560 !important; }
        .page-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem;
        }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .table thead th { background: #1a1a2e; color: white; border: none; }
        .badge-personal { background-color: #e94560; }
        .badge-group    { background-color: #0f3460; }
        .btn-add        { background: #e94560; border: none; }
        .btn-add:hover  { background: #c73652; }
    </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/home"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
            <i class="bi bi-lightning-charge-fill"></i> FitCenter
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/trainers">
                        <i class="bi bi-people-fill me-1"></i>Trainers
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/trainers/add">
                        <i class="bi bi-person-plus-fill me-1"></i>Register
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <!-- Page Banner -->
    <div class="page-banner d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h3 class="mb-1"><i class="bi bi-person-badge me-2"></i>Trainer Management</h3>
            <p class="mb-0 opacity-75">Register, search, update, and delete trainer records.</p>
        </div>
        <a href="/trainers/add" class="btn btn-add text-white px-4">
            <i class="bi bi-plus-lg me-1"></i>Add Trainer
        </a>
    </div>

    <!-- Flash Messages (Thymeleaf: th:if checks if attribute exists) -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mt-3">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mt-3">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search Bar -->
    <div class="card my-4">
        <div class="card-body">
            <form action="/trainers/search" method="get">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <!--
                        th:value  – pre-fills the box with the keyword that was searched
                        (stays empty on first load because keyword is null)
                    -->
                    <input type="text" class="form-control" name="keyword"
                           placeholder="Search by name or specialization..."
                           th:value="${keyword}">
                    <button class="btn btn-dark" type="submit">Search</button>
                    <a class="btn btn-outline-secondary" href="/trainers">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Trainer Table -->
    <div class="card">
        <div class="card-body p-0">

            <!-- Thymeleaf: th:if – shown only when trainers list is empty -->
            <div th:if="${#lists.isEmpty(trainers)}" class="text-center py-5">
                <i class="bi bi-people display-3 text-muted"></i>
                <p class="mt-2 text-muted fs-5">No trainers found.</p>
                <a href="/trainers/add" class="btn btn-dark">
                    <i class="bi bi-plus-lg me-1"></i>Add First Trainer
                </a>
            </div>

            <!-- Thymeleaf: th:unless – shown only when list is NOT empty -->
            <div th:unless="${#lists.isEmpty(trainers)}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Specialization</th>
                            <th>Phone</th>
                            <th>Schedule</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!--
                            th:each – loops over the trainers list (like a for-each loop).
                            th:text – sets the text content of an element.
                            th:href – sets href dynamically using Thymeleaf expressions.
                        -->
                        <tr th:each="t : ${trainers}">
                            <td><code th:text="${t.trainerId}"></code></td>
                            <td><strong th:text="${t.name}"></strong></td>
                            <td>
                                <!-- Thymeleaf conditional: different badge per trainer type -->
                                <span th:if="${t.trainerType == 'personal'}"
                                      class="badge badge-personal">
                                        <i class="bi bi-person-fill me-1"></i>
                                        <span th:text="${t.typeLabel}"></span>
                                    </span>
                                <span th:unless="${t.trainerType == 'personal'}"
                                      class="badge badge-group">
                                        <i class="bi bi-people-fill me-1"></i>
                                        <span th:text="${t.typeLabel}"></span>
                                    </span>
                            </td>
                            <td th:text="${t.specialization}"></td>
                            <td th:text="${t.phone}"></td>
                            <!--
                                Polymorphism visible here:
                                getScheduleDescription() returns different text
                                for PersonalTrainer vs GroupTrainer
                            -->
                            <td><small class="text-muted" th:text="${t.scheduleDescription}"></small></td>
                            <td class="text-center">
                                <!-- View -->
                                <a th:href="@{/trainers/{id}(id=${t.trainerId})}"
                                   class="btn btn-sm btn-outline-secondary me-1" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <!-- Edit -->
                                <a th:href="@{/trainers/{id}/edit(id=${t.trainerId})}"
                                   class="btn btn-sm btn-outline-warning me-1" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <!-- Delete (uses a form with POST) -->
                                <form th:action="@{/trainers/{id}/delete(id=${t.trainerId})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Delete trainer ' + /*[[${t.name}]]*/ '' + '?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer text-muted small">
                    Showing <strong th:text="${#lists.size(trainers)}"></strong> trainer(s)
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
