<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Profile – FitCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: 700; }
        .nav-link { color: #bbb !important; }
        .nav-link:hover { color: #e94560 !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .profile-banner {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white; padding: 2.5rem; border-radius: 12px 12px 0 0; text-align: center;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #e94560; color: white;
            font-size: 2rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .info-row { padding: .85rem 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #555; min-width: 140px; display: inline-block; }
        .schedule-box {
            background: #f8f9fa; border-left: 4px solid #e94560;
            padding: .9rem 1rem; border-radius: 4px; margin-top: 1rem;
        }
        .badge-personal { background-color: #e94560; }
        .badge-group    { background-color: #0f3460; }
        .btn-edit { background: #0f3460; border: none; }
        .btn-edit:hover { background: #0a2744; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/trainers"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/trainers"><i class="bi bi-people-fill me-1"></i>Trainers</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/trainers">Trainers</a></li>
                    <li class="breadcrumb-item active">Trainer Profile</li>
                </ol>
            </nav>

            <!-- Error fallback -->
            <div th:if="${errorMsg}" class="alert alert-danger">
                <span th:text="${errorMsg}"></span>
            </div>

            <!-- Profile card: shown only when trainer data exists -->
            <div class="card" th:if="${trainer}">

                <!-- Banner: avatar initial + name + type badge -->
                <div class="profile-banner">
                    <!--
                        th:text with substring: gets first character of name for the avatar.
                        ${#strings.substring(trainer.name,0,1)} – Thymeleaf String utility.
                    -->
                    <div class="avatar" th:text="${#strings.substring(trainer.name, 0, 1).toUpperCase()}"></div>
                    <h4 class="mb-1" th:text="${trainer.name}"></h4>

                    <!--
                        Polymorphism visible in the template:
                        trainer.typeLabel returns "Personal Trainer" or "Group Trainer"
                        depending on whether the object is PersonalTrainer or GroupTrainer.
                    -->
                    <span th:if="${trainer.trainerType == 'personal'}" class="badge badge-personal">
                        <i class="bi bi-person-fill me-1"></i>
                        <span th:text="${trainer.typeLabel}"></span>
                    </span>
                    <span th:unless="${trainer.trainerType == 'personal'}" class="badge badge-group">
                        <i class="bi bi-people-fill me-1"></i>
                        <span th:text="${trainer.typeLabel}"></span>
                    </span>

                    <p class="mt-2 mb-0 opacity-75">
                        <i class="bi bi-award me-1"></i>
                        <span th:text="${trainer.specialization}"></span>
                    </p>
                </div>

                <!-- Detail rows -->
                <div class="card-body p-4">

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-hash me-1 text-danger"></i>Trainer ID</span>
                        <code th:text="${trainer.trainerId}"></code>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-envelope me-1 text-danger"></i>Email</span>
                        <span th:text="${trainer.email}"></span>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-telephone me-1 text-danger"></i>Phone</span>
                        <span th:text="${trainer.phone}"></span>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-award me-1 text-danger"></i>Specialization</span>
                        <span th:text="${trainer.specialization}"></span>
                    </div>

                    <!--
                        Schedule box: calls getScheduleDescription() on the Trainer object.
                        Polymorphism: the actual method executed depends on whether
                        trainer is a PersonalTrainer or GroupTrainer at runtime.
                    -->
                    <div class="schedule-box">
                        <p class="small text-muted text-uppercase fw-bold mb-1">
                            <i class="bi bi-calendar-check me-1"></i>Training Schedule
                        </p>
                        <span th:text="${trainer.scheduleDescription}"></span>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/trainers/{id}/edit(id=${trainer.trainerId})}"
                           class="btn btn-edit text-white">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <a href="/trainers" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back
                        </a>

                        <!-- Delete (POST form) -->
                        <form th:action="@{/trainers/{id}/delete(id=${trainer.trainerId})}"
                              method="post" class="ms-auto"
                              onsubmit="return confirm('Delete this trainer?');">
                            <button type="submit" class="btn btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
