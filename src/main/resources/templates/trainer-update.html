<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Trainer – FitCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: 700; }
        .nav-link { color: #bbb !important; }
        .nav-link:hover { color: #e94560 !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .card-header {
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            color: white; border-radius: 12px 12px 0 0 !important;
        }
        .form-control:focus {
            border-color: #0f3460;
            box-shadow: 0 0 0 .2rem rgba(15,52,96,.2);
        }
        .btn-save { background: #0f3460; border: none; }
        .btn-save:hover { background: #0a2744; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/trainers"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/trainers"><i class="bi bi-people-fill me-1"></i>Trainers</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/trainers">Trainers</a></li>
                    <li class="breadcrumb-item active">Update Trainer</li>
                </ol>
            </nav>

            <div th:if="${errorMsg}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${errorMsg}"></span>
            </div>

            <div class="card">
                <div class="card-header p-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Update Trainer</h5>
                    <!-- th:text – shows trainer ID dynamically -->
                    <span class="badge bg-light text-dark font-monospace"
                          th:text="${trainer.trainerId}"></span>
                </div>
                <div class="card-body p-4">

                    <!--
                        th:action – builds the URL dynamically using the trainer's ID.
                        Maps to @PostMapping("/{id}/edit") in TrainerController.
                    -->
                    <form th:action="@{/trainers/{id}/edit(id=${trainer.trainerId})}" method="post">

                        <!-- Trainer Type -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Trainer Type <span class="text-danger">*</span>
                            </label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="trainerType" id="typePersonal" value="personal"
                                           th:checked="${trainer.trainerType == 'personal'}" required>
                                    <label class="form-check-label" for="typePersonal">
                                        <i class="bi bi-person-fill text-danger me-1"></i>Personal Trainer
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="trainerType" id="typeGroup" value="group"
                                           th:checked="${trainer.trainerType == 'group'}">
                                    <label class="form-check-label" for="typeGroup">
                                        <i class="bi bi-people-fill text-primary me-1"></i>Group Trainer
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Full Name: th:value pre-fills field with current data -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">
                                Full Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="name"
                                   name="name" th:value="${trainer.name}" required>
                        </div>

                        <!-- Specialization -->
                        <div class="mb-3">
                            <label for="specialization" class="form-label fw-bold">
                                Specialization <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="specialization"
                                   name="specialization" th:value="${trainer.specialization}" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input type="email" class="form-control" id="email"
                                   name="email" th:value="${trainer.email}" required>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">
                                Phone <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="phone"
                                   name="phone" th:value="${trainer.phone}" required>
                        </div>

                        <!-- Availability -->
                        <div class="mb-4">
                            <label for="availability" class="form-label fw-bold">
                                Availability <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="availability"
                                   name="availability" th:value="${trainer.availability}" required>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-save text-white px-4">
                                <i class="bi bi-save me-1"></i>Save Changes
                            </button>
                            <a href="/trainers" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>

                            <!-- Delete button (separate form using POST) -->
                            <form th:action="@{/trainers/{id}/delete(id=${trainer.trainerId})}"
                                  method="post" class="ms-auto"
                                  onsubmit="return confirm('Permanently delete this trainer?');">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="bi bi-trash me-1"></i>Delete
                                </button>
                            </form>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html><!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Profile – FitCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: 700; }
        .nav-link { color: #bbb !important; }
        .nav-link:hover { color: #e94560 !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .profile-banner {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white; padding: 2.5rem; border-radius: 12px 12px 0 0; text-align: center;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #e94560; color: white;
            font-size: 2rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .info-row { padding: .85rem 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #555; min-width: 140px; display: inline-block; }
        .schedule-box {
            background: #f8f9fa; border-left: 4px solid #e94560;
            padding: .9rem 1rem; border-radius: 4px; margin-top: 1rem;
        }
        .badge-personal { background-color: #e94560; }
        .badge-group    { background-color: #0f3460; }
        .btn-edit { background: #0f3460; border: none; }
        .btn-edit:hover { background: #0a2744; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/trainers"><i class="bi bi-lightning-charge-fill"></i> FitCenter</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/trainers"><i class="bi bi-people-fill me-1"></i>Trainers</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/trainers">Trainers</a></li>
                    <li class="breadcrumb-item active">Trainer Profile</li>
                </ol>
            </nav>

            <!-- Error fallback -->
            <div th:if="${errorMsg}" class="alert alert-danger">
                <span th:text="${errorMsg}"></span>
            </div>

            <!-- Profile card: shown only when trainer data exists -->
            <div class="card" th:if="${trainer}">

                <!-- Banner: avatar initial + name + type badge -->
                <div class="profile-banner">
                    <!--
                        th:text with substring: gets first character of name for the avatar.
                        ${#strings.substring(trainer.name,0,1)} – Thymeleaf String utility.
                    -->
                    <div class="avatar" th:text="${#strings.substring(trainer.name, 0, 1).toUpperCase()}"></div>
                    <h4 class="mb-1" th:text="${trainer.name}"></h4>

                    <!--
                        Polymorphism visible in the template:
                        trainer.typeLabel returns "Personal Trainer" or "Group Trainer"
                        depending on whether the object is PersonalTrainer or GroupTrainer.
                    -->
                    <span th:if="${trainer.trainerType == 'personal'}" class="badge badge-personal">
                        <i class="bi bi-person-fill me-1"></i>
                        <span th:text="${trainer.typeLabel}"></span>
                    </span>
                    <span th:unless="${trainer.trainerType == 'personal'}" class="badge badge-group">
                        <i class="bi bi-people-fill me-1"></i>
                        <span th:text="${trainer.typeLabel}"></span>
                    </span>

                    <p class="mt-2 mb-0 opacity-75">
                        <i class="bi bi-award me-1"></i>
                        <span th:text="${trainer.specialization}"></span>
                    </p>
                </div>

                <!-- Detail rows -->
                <div class="card-body p-4">

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-hash me-1 text-danger"></i>Trainer ID</span>
                        <code th:text="${trainer.trainerId}"></code>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-envelope me-1 text-danger"></i>Email</span>
                        <span th:text="${trainer.email}"></span>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-telephone me-1 text-danger"></i>Phone</span>
                        <span th:text="${trainer.phone}"></span>
                    </div>

                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-award me-1 text-danger"></i>Specialization</span>
                        <span th:text="${trainer.specialization}"></span>
                    </div>

                    <!--
                        Schedule box: calls getScheduleDescription() on the Trainer object.
                        Polymorphism: the actual method executed depends on whether
                        trainer is a PersonalTrainer or GroupTrainer at runtime.
                    -->
                    <div class="schedule-box">
                        <p class="small text-muted text-uppercase fw-bold mb-1">
                            <i class="bi bi-calendar-check me-1"></i>Training Schedule
                        </p>
                        <span th:text="${trainer.scheduleDescription}"></span>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/trainers/{id}/edit(id=${trainer.trainerId})}"
                           class="btn btn-edit text-white">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <a href="/trainers" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back
                        </a>

                        <!-- Delete (POST form) -->
                        <form th:action="@{/trainers/{id}/delete(id=${trainer.trainerId})}"
                              method="post" class="ms-auto"
                              onsubmit="return confirm('Delete this trainer?');">
                            <button type="submit" class="btn btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
