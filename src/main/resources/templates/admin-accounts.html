<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Accounts – FitCenter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #e94560 !important; font-weight: 700; }
    .nav-link { color: #bbb !important; }
    .nav-link:hover { color: #e94560 !important; }
    .banner { background: linear-gradient(135deg, #1a1a2e, #0f3460);
              color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .table thead th { background: #1a1a2e; color: white; }
    .badge-superadmin { background-color: #e94560; }
    .badge-admin      { background-color: #0f3460; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/admin/dashboard">
      <i class="bi bi-shield-lock-fill me-1"></i> FitCenter Admin
    </a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/overview">Overview</a></li>
      <li class="nav-item"><a class="nav-link active" href="/admin/accounts">Manage Admins</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="/admin/logout">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container pb-5">

  <div class="banner d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-1"><i class="bi bi-people me-2"></i>Admin Accounts</h3>
      <p class="mb-0 opacity-75">Create, view, update and delete admin accounts.</p>
    </div>
    <a href="/admin/accounts/add" class="btn btn-danger">
      <i class="bi bi-person-plus me-1"></i>Add Admin
    </a>
  </div>

  <!-- Flash messages -->
  <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mt-3">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mt-3">
    <i class="bi bi-exclamation-triangle me-2"></i>
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Admin Table -->
  <div class="card">
    <div class="card-body p-0">

      <div th:if="${#lists.isEmpty(admins)}" class="text-center py-5">
        <i class="bi bi-people display-3 text-muted"></i>
        <p class="mt-2 text-muted">No admin accounts found.</p>
        <a href="/admin/accounts/add" class="btn btn-dark">Add Admin</a>
      </div>

      <div th:unless="${#lists.isEmpty(admins)}">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Admin ID</th>
                <th>Username</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
                <!--
                  Polymorphism: getAdminPrivileges() returns different text
                  for SuperAdmin vs RegularAdmin
                -->
                <th>Privileges</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="a : ${admins}">
                <td><code th:text="${a.adminId}"></code></td>
                <td><strong th:text="${a.username}"></strong></td>
                <td th:text="${a.fullName}"></td>
                <td><small th:text="${a.email}"></small></td>
                <td>
                  <!-- Polymorphism: getAdminRoleLabel() per subclass -->
                  <span th:if="${a.adminRole == 'superadmin'}"
                        class="badge badge-superadmin"
                        th:text="${a.adminRoleLabel}"></span>
                  <span th:unless="${a.adminRole == 'superadmin'}"
                        class="badge badge-admin"
                        th:text="${a.adminRoleLabel}"></span>
                </td>
                <td><small th:text="${a.createdDate}"></small></td>
                <td>
                  <small class="text-muted" th:text="${a.adminPrivileges}"></small>
                </td>
                <td class="text-center">
                  <a th:href="@{/admin/accounts/{id}/edit(id=${a.adminId})}"
                     class="btn btn-sm btn-outline-warning me-1" title="Edit">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <form th:action="@{/admin/accounts/{id}/delete(id=${a.adminId})}"
                        method="post" class="d-inline"
                        th:onsubmit="|return confirm('Delete admin ' + ${a.username} + '?')|">
                    <button class="btn btn-sm btn-outline-danger" title="Delete">
                      <i class="bi bi-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer text-muted small">
          Total: <strong th:text="${#lists.size(admins)}"></strong> admin(s)
        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
